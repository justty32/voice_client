[AUDIO]
sample_rate = 16000
channels = 1
chunk_size = 1024
chunk_duration = 60
silence_seconds = 1.5
silence_threshold = 300
max_duration = 0

[CONTROL]
key_record_toggle = f8
key_quick_send = f9
key_force_stop_tts = f10

[STT]
model_size = base
device = cpu
compute_type = int8
language = zh
beam_size = 5
vad_filter = true

[SLM]
enabled = true
model = gemma3:1b
base_url = http://localhost:11434
summary_threshold = 20

[LLM]
model = gemma3:12b
base_url = http://localhost:11434
api_key =

[SERVER]
enabled = false
url = http://localhost:8000/chat
timeout = 30
retry = 3

[TTS]
engine = pyttsx3
rate = 180
volume = 1.0
kokoro_url = http://localhost:8880

[SESSION]
auto_save = true
backup_interval = 300

[WORKSPACE]
output_dir = output
failed_dir = output/failed
sessions_file = output/.sessions.json
permissions_file = output/.permissions.json
log_file = output/system.log

[UI]
status_refresh_rate = 0.1

[LOGGING]
level = INFO
